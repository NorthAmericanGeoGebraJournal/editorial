  - name: Author checklist
    url: https://github.com/NorthAmericanGeoGebraJournal/editorial/blob/main/checklists/author.md
    about: Work through this before submitting.
  - name: Article template
    url: https://github.com/NorthAmericanGeoGebraJournal/article-template
    about: Start your manuscript here.
  - name: The journal
    url: https://geogebrajournal.com
    about: Published articles and the archive.
  - name: A question, not a submission
    url: https://github.com/NorthAmericanGeoGebraJournal/editorial/discussions
    about: Ask the editors anything. No checklist required.
